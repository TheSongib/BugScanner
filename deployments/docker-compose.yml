services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bugscanner
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d bugscanner"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: scanner
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
      # RabbitMQ 3.12+ enforces a 30-minute consumer_timeout by default.
      # Vulnscan runs 4 nuclei passes (8+15+10+20 min = 53 min worst case),
      # so the default would forcibly close the channel mid-scan. Set to 2 hours.
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit consumer_timeout 7200000"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.orchestrator
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://scanner:${POSTGRES_PASSWORD:-changeme}@postgres:5432/bugscanner?sslmode=disable
      RABBITMQ_URL: amqp://scanner:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.worker
    deploy:
      replicas: 2
    environment:
      DATABASE_URL: postgres://scanner:${POSTGRES_PASSWORD:-changeme}@postgres:5432/bugscanner?sslmode=disable
      RABBITMQ_URL: amqp://scanner:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
    volumes:
      # nuclei stores templates at $HOME/nuclei-templates/ (not .local/).
      # Mounting here lets you run `docker compose exec worker nuclei -update-templates`
      # to refresh templates on a live stack without rebuilding the image.
      - nuclei-templates:/root/nuclei-templates
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  nuclei-templates:
